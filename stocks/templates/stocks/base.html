{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Market Dashboard">
    <meta name="theme-color" content="#070b14">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>{% block title %}Market Dashboard{% endblock %}</title>
    <style>
        :root {
            --bg:          #070b14;
            --bg-1:        #070b14;
            --bg-2:        #0c1221;
            --surface:     #0c1221;
            --card:        #0f1829;
            --card-2:      #141f35;
            --panel:       #0c1221;
            --border:      rgba(255,255,255,0.07);
            --border-hi:   rgba(255,255,255,0.12);
            --text-main:   #e2e8f0;
            --text-sub:    #94a3b8;
            --text-muted:  #475569;
            --accent:      #38bdf8;
            --accent-dim:  rgba(56,189,248,0.1);
            --pos:         #4ade80;
            --pos-dim:     rgba(74,222,128,0.1);
            --neg:         #f87171;
            --neg-dim:     rgba(248,113,113,0.1);
            --gold:        #fbbf24;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Inter", system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            font-size: 14px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Top nav ───────────────────────────────────── */
        .topnav {
            position: sticky;
            top: 0;
            z-index: 200;
            height: 54px;
            background: rgba(7,11,20,0.96);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            padding: 0 28px;
            gap: 0;
        }

        .brand {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--text-main);
            text-decoration: none;
            white-space: nowrap;
            margin-right: 36px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-dot { color: var(--accent); font-size: 18px; }

        .nav-links {
            display: flex;
            gap: 2px;
            flex: 1;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-sub);
            font-size: 13px;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 6px;
            transition: color 0.15s, background 0.15s;
            letter-spacing: 0.1px;
        }

        .nav-links a:hover {
            color: var(--text-main);
            background: rgba(255,255,255,0.05);
        }

        .nav-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-user .username {
            font-size: 12px;
            color: var(--text-muted);
            padding: 0 4px;
        }

        .nav-user a, .nav-user button {
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-sub);
            text-decoration: none;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 5px 12px;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 0.1px;
        }

        .nav-user a:hover, .nav-user button:hover {
            color: var(--text-main);
            border-color: var(--border-hi);
            background: rgba(255,255,255,0.05);
        }

        .nav-user form { margin: 0; }

        /* ── Container ─────────────────────────────────── */
        .page-shell {
            max-width: 1320px;
            margin: 0 auto;
            padding: 36px 28px 72px;
        }

        /* ── Page header ───────────────────────────────── */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--text-main);
        }

        .subtitle {
            margin-top: 4px;
            font-size: 13px;
            color: var(--text-muted);
        }

        /* ── Buttons ───────────────────────────────────── */
        .btn, .link-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            padding: 7px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.04);
            color: var(--text-sub);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .btn:hover, .link-btn:hover {
            background: rgba(255,255,255,0.07);
            color: var(--text-main);
            border-color: var(--border-hi);
        }

        .btn-primary {
            background: var(--accent) !important;
            border-color: var(--accent) !important;
            color: #000 !important;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #7dd3fc !important;
            border-color: #7dd3fc !important;
            color: #000 !important;
        }

        /* Legacy button reset */
        button { font-family: inherit; }

        /* ── Panels / cards ────────────────────────────── */
        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }

        .panel h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 14px;
            color: var(--text-main);
        }

        /* ── Data rows ─────────────────────────────────── */
        .metric-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 7px 0;
            border-bottom: 1px solid var(--border);
            gap: 16px;
        }

        .metric-row:last-child { border-bottom: none; }

        .metric-label { color: var(--text-muted); font-size: 12px; }

        .metric-value {
            font-size: 13px;
            font-weight: 600;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        /* ── Color helpers ─────────────────────────────── */
        .positive { color: var(--pos); }
        .negative { color: var(--neg); }
        .neutral  { color: var(--text-main); }
        .muted    { color: var(--text-muted); }

        /* ── Error box ─────────────────────────────────── */
        .error-box {
            background: var(--neg-dim);
            border: 1px solid rgba(248,113,113,0.25);
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 13px;
            color: #fca5a5;
            margin-bottom: 16px;
        }

        .note { font-size: 12px; color: var(--text-muted); }

        {% block extra_style %}{% endblock %}
    </style>
</head>
<body>
    <nav class="topnav">
        <a class="brand" href="{% url 'home' %}">
            <span class="brand-dot">◆</span>MARKET
        </a>
        {% if request.user.is_authenticated %}
            <div class="nav-links">
                <a href="{% url 'analyze' %}">Dashboard</a>
                <a href="{% url 'home' %}">Watchlist</a>
                <a href="{% url 'alerts' %}">Alerts</a>
            </div>
            <div class="nav-user">
                <span class="username">{{ request.user.username }}</span>
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button>Sign out</button>
                </form>
            </div>
        {% else %}
            <div class="nav-links"></div>
            <div class="nav-user">
                <a href="{% url 'login' %}">Log in</a>
                <a href="{% url 'signup' %}">Sign up</a>
            </div>
        {% endif %}
    </nav>

    {% block content %}{% endblock %}
</body>
</html>
